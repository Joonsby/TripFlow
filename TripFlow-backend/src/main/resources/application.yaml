spring:
  application:
    name: TripFlow-backend

  datasource:
    url: jdbc:mysql://mysql:3306/traveling?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: root
    password: "root1234"
    driver-class-name: com.mysql.cj.jdbc.Driver

  flyway:
    enabled: true
    locations: classpath:db/migration

mybatis:
  mapper-locations: classpath*:mapper/**/*.xml
  type-aliases-package: com.tripflow
  configuration:
    map-underscore-to-camel-case: true

server:
  port: 8080