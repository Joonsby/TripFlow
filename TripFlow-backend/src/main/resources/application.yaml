spring:
  application:
    name: TripFlow-backend

  profiles:
    default: local

  datasource:
    url: jdbc:mysql://${DB_HOST}:${DB_PORT}/${DB_NAME}?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  flyway:
    enabled: true
    locations: classpath:db/migration

tripflow:
  auth:
    jwt-secret: ${JWT_SECRET}
    access-token-minutes: ${JWT_ACCESS_TOKEN_MINUTES:30}
    refresh-token-days: ${JWT_REFRESH_TOKEN_DAYS:14}
    cookie-secure: ${COOKIE_SECURE:false}

mybatis:
  mapper-locations: classpath*:mapper/**/*.xml
  type-aliases-package: com.tripflow
  configuration:
    map-underscore-to-camel-case: true

server:
  port: ${SERVER_PORT:8080}

---
# local 프로필에서만 .env 파일 읽기
spring:
  config:
    activate:
      on-profile: local
    import: optional:file:.env[.properties]