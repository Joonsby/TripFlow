services:
  mysql:
    image: mysql:8.0
    container_name: tripflow-mysql
    restart: unless-stopped
    env_file:
      - /home/ubuntu/apps/TripFlow/shared/env/backend.env
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test:
        - CMD
        - mysqladmin
        - ping
        - -h
        - localhost
        - -uroot
        - -p${MYSQL_ROOT_PASSWORD}
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build: .
    container_name: tripflow-backend
    restart: unless-stopped
    env_file:
      - /home/ubuntu/apps/TripFlow/shared/env/backend.env
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: ${MYSQL_DATABASE}
      DB_USER: ${MYSQL_USER}
      DB_PASSWORD: ${MYSQL_PASSWORD}
    expose:
      - "8080"
    depends_on:
      mysql:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    container_name: tripflow-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - /home/ubuntu/apps/TripFlow/shared/certbot/conf:/etc/letsencrypt:ro
      - /home/ubuntu/apps/TripFlow/shared/certbot/www:/var/www/certbot:ro
    depends_on:
      - backend

  certbot:
    image: certbot/certbot
    volumes:
      - /home/ubuntu/apps/TripFlow/shared/certbot/conf:/etc/letsencrypt
      - /home/ubuntu/apps/TripFlow/shared/certbot/www:/var/www/certbot

volumes:
  mysql_data:
