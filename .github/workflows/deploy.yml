name: Deploy TripFlow Backend

on:
  push:
    branches:
      - main
    paths:
      - "TripFlow-backend/**"
      - ".github/workflows/deploy-backend.yml"

jobs:
  deploy:
    runs-on: [self-hosted, linux, x64]

    steps:
      - name: Checkout backend only
        uses: actions/checkout@v6
        with:
          sparse-checkout: |
            TripFlow-backend
          sparse-checkout-cone-mode: true
          fetch-depth: 1

      - name: Sync backend source
        run: |
          mkdir -p /home/ubuntu/apps/TripFlow/TripFlow-backend

          rsync -av --delete \
            --exclude='.env' \
            --exclude='.env.*' \
            --exclude='certbot/' \
            TripFlow-backend/ \
            /home/ubuntu/apps/TripFlow/TripFlow-backend/

      - name: Validate production configuration
        working-directory: /home/ubuntu/apps/TripFlow/TripFlow-backend
        run: |
          docker compose \
            --project-directory /home/ubuntu/apps/TripFlow/TripFlow-backend \
            --env-file /home/ubuntu/apps/TripFlow/shared/env/backend.env \
            -f /home/ubuntu/apps/TripFlow/TripFlow-backend/docker-compose.prod.yml \
            config --quiet

      - name: Deploy containers
        working-directory: /home/ubuntu/apps/TripFlow/TripFlow-backend
        run: |
          docker compose \
            --project-directory /home/ubuntu/apps/TripFlow/TripFlow-backend \
            --env-file /home/ubuntu/apps/TripFlow/shared/env/backend.env \
            -f /home/ubuntu/apps/TripFlow/TripFlow-backend/docker-compose.prod.yml \
            up -d --build

      - name: Restart Nginx
        working-directory: /home/ubuntu/apps/TripFlow/TripFlow-backend
        run: |
          docker compose \
            --project-directory /home/ubuntu/apps/TripFlow/TripFlow-backend \
            --env-file /home/ubuntu/apps/TripFlow/shared/env/backend.env \
            -f /home/ubuntu/apps/TripFlow/TripFlow-backend/docker-compose.prod.yml \
            restart nginx

      - name: Validate Nginx configuration
        working-directory: /home/ubuntu/apps/TripFlow/TripFlow-backend
        run: |
          docker compose \
            --project-directory /home/ubuntu/apps/TripFlow/TripFlow-backend \
            --env-file /home/ubuntu/apps/TripFlow/shared/env/backend.env \
            -f /home/ubuntu/apps/TripFlow/TripFlow-backend/docker-compose.prod.yml \
            exec -T nginx nginx -t

      - name: Verify backend connection from Nginx
        working-directory: /home/ubuntu/apps/TripFlow/TripFlow-backend
        run: |
          response="$(
            docker compose \
              --project-directory /home/ubuntu/apps/TripFlow/TripFlow-backend \
              --env-file /home/ubuntu/apps/TripFlow/shared/env/backend.env \
              -f /home/ubuntu/apps/TripFlow/TripFlow-backend/docker-compose.prod.yml \
              exec -T nginx \
              wget -qSO- http://backend:8080/ -O /dev/null 2>&1 \
              | head -n 1
          )"

          echo "$response"

          echo "$response" | grep -E \
            "HTTP/1\.[01] (200|201|204|301|302|400|401|403|404)"

      - name: Show container status
        working-directory: /home/ubuntu/apps/TripFlow/TripFlow-backend
        run: |
          docker compose \
            --project-directory /home/ubuntu/apps/TripFlow/TripFlow-backend \
            --env-file /home/ubuntu/apps/TripFlow/shared/env/backend.env \
            -f /home/ubuntu/apps/TripFlow/TripFlow-backend/docker-compose.prod.yml \
            ps

      - name: Show logs on failure
        if: failure()
        working-directory: /home/ubuntu/apps/TripFlow/TripFlow-backend
        run: |
          docker compose \
            --project-directory /home/ubuntu/apps/TripFlow/TripFlow-backend \
            --env-file /home/ubuntu/apps/TripFlow/shared/env/backend.env \
            -f /home/ubuntu/apps/TripFlow/TripFlow-backend/docker-compose.prod.yml \
            logs --tail=200